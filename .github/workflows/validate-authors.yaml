name: Validate Authors

on:
  # Runs at 09:00 UTC on the 1st day of every month
  schedule:
    - cron: '0 9 1 * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  validate-authors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Author Validation Script
        run: npm run generate-authors

      - name: Commit and push updated author data
        run: |
          git config user.name "GitHub Action (Author Validator)"
          git config user.email "action@github.com"
          git add scripts/author-validation/data/authors.json
          git add scripts/author-validation/reports/validation-report.json || true
          git diff --staged --quiet || git commit -m "Update Validate authors data - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git push
