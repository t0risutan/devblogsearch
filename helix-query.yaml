version: 1

indices:
  english: &default
    include:
      - /en/publish/**
    exclude:
      - '**/Document.*'
    target: /en/query-index.json
    properties:
      author:
        select: head > meta[name="author"]
        value: |
          attribute(el, 'content')
      title:
        select: main h1:first-of-type
        value: |
          textContent(el)
      date:
        select: head > meta[name="publication-date"]
        value: |
          dateValue(attribute(el, 'content'), 'MM-DD-YYYY')

      # 🔽 Added for accurate metadata-based sorting (safe addition)
      sortDateTimestamp:
        select: head > meta[name="m_date"]
        value: |
          parseTimestamp(attribute(el, 'content'), 'YYYY-MM-DD')
      sortDate:
        select: head > meta[name="publication-date"], head > meta[name="m_date"]
        value: |
          attribute(el, 'content')
      updatedDate:
        select: head > meta[name="updated_date"]
        value: |
          attribute(el, 'content')          
      # 🔼 End of addition

      image:
        select: head > meta[property="og:image"]
        value: |
          match(attribute(el, 'content'), 'https:\/\/[^/]+(\/.*)')
      imageAlt:
        select: head > meta[property="og:image:alt"]
        value: |
          attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, 'content')
      tags:
        select: head > meta[property="article:tag"]
        values: |
          attribute(el, 'content')
      robots:
        select: head > meta[name="robots"]
        value: |
          attribute(el, 'content')
      lastModified:
        select: none
        value: |
          parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')

# The blog.a.c config includes multiple additional languages, similar to this:
