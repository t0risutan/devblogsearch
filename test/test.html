<!DOCTYPE html>
<html>
<head>
    <title>Blog Search Component Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Blog Search Component Test</h1>
    
    <h2>Standalone Search:</h2>
    <blog-search></blog-search>
    
    <h2>Search in Header (Nav Style):</h2>
    <header>
        <nav class="feds-nav">
            <span>Logo</span>
            <span>Menu</span>
            <blog-search class="nav-search"></blog-search>
        </nav>
    </header>

    <h2>Explore all posts (facets + grid):</h2>
    <blog-search class="explore-facets" variant="explore"></blog-search>
    <div class="article-feed"></div>
    
    <script type="module">
        import '../web-components/search/blog-search.js';
    </script>
</body>
</html>
